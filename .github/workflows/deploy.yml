name: Deploy to PyPI
on:
  release:
    types: [published]
jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write          # required for Trusted Publishing
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build
        run: |
          pip install -U build
          python -m build
      - name: Publish package
        uses: pypa/gh-action-pypi-publish@release/v1
        # no user or password: OIDC handles authentication
